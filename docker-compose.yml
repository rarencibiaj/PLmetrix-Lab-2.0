services:
  backend:
    build:
      context: ./backend
    container_name: plmetrix-backend
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://dinamica1.fciencias.unam.mx/plmetrix-api
    container_name: plmetrix-frontend
    ports:
      - "5006:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://dinamica1.fciencias.unam.mx/plmetrix-api
    depends_on:
      - backend
    restart: always
